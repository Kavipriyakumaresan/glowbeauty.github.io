    <header>
        <h1>GlowBeauty</h1>

    <section class="section">
        <h2>Contact Us</h2>

        <!-- Contact Form -->
        <div style="max-width:600px;margin:auto;">
            <form>

                <label><b>Full Name</b></label><br>
                <input type="text" placeholder="Enter your name" required
                style="width:100%;padding:10px;margin:10px 0;border-radius:8px;border:1px solid #ccc;"><br>

                <label><b>Email Address</b></label><br>
                <input type="email" placeholder="Enter your email" required
                style="width:100%;padding:10px;margin:10px 0;border-radius:8px;border:1px solid #ccc;"><br>

                <label><b>Order Message</b></label><br>
                <textarea rows="5" placeholder="Write your order details here..." required
                style="width:100%;padding:10px;margin:10px 0;border-radius:8px;border:1px solid #ccc;"></textarea><br>

                <button class="btn" type="submit">Send Message</button>

            </form>
        </div>

        <!-- Contact Details -->
        <div style="text-align:center;margin-top:50px;">
            <h3 style="color:#ff1493;">Our Contact Details</h3>
            <p>Email: support@glowbeauty.com</p>
            <p>Phone: +91 98765 43210</p>
            <p>Address: 25 Beauty Street, Salem, Tamil Nadu, India</p>
            <p>Working Hours: Mon - Sat (9:00 AM - 8:00 PM)</p>
        </div>

    </section>

    <footer>
        <p>© 2026 GlowBeauty. All Rights Reserved.</p>
    </footer>
